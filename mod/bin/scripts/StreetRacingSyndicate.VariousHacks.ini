[BootFlow]
SkipIntroVideo = 1               ; Skips the intro videos when you boot the game.
SkipLegalScreens = 1             ; Skips the legal screens when you boot the game.

[Graphics.Window]
Width = 0
Height = 0
; NOTE: Enabling windowed mode increases latency in Windows (due to D3D9)! Read more here: https://performance.moddinglinked.com/falloutnv.html#DisplayModeComparison
WindowedMode = 0                 ; Set windowed mode here. (0 = Disabled / Exclusive Fullscreen | 1 = Bordered | 2 = Borderless | 3 = Borderless Stretched)
AlwaysOnTop = 0                  ; Set if the window is to be displayed always in front of others. This is necessary if you want the game to be displayed in front of the taskbar in Windows.

[Graphics.AspectRatio]
FixHUD = 1
FixFOV = 1

[Graphics.Effects]
RoadCarReflections = 0           ; Car reflections on the road in open world
HighestLods = 1                  ; Cars will use highest quality models available
InfiniteNosFlame = 0             ; Nos flame will not disappear after a second of use

[Graphics.Effects.NosFlame]
Red = 255
Green = 255
Blue = 255
Alpha = 255

[Gameplay]
MoreCameraModes = 0			      
CopCarInDealer = 1               ; Adds Ford Crown to career dealer. Go to Nissan section to buy.
MaxRespect = 250                 ; Maximum respect that can be earned per race
NoDecalRestrictions = 1          ; All decals are now available to be installed no matter what brands are installed on the car
ShowHiddenVinyl = 1              ; Show the hidden vinyl
NoEngineRestrictions = 0         ; Allows to enter events even if engine HP requirement is not met	      
NumPaintColors = 21              ; 31 - max tested amount

[Gameplay.Assists]
NoABS = 0                        ; Disables ABS completely.

[Gameplay.Assists.Steering]
YawSteerAssist = -1.0            ; Global YAW-STEER-ASSIST value. Values less than zero = read game defaults. Equal or bigger than zero = use typed value
AssistWeight = -1.0              ; Global ASSIST-WEIGHT value. Values less than zero = read game defaults. Equal or bigger than zero = use typed value
ReturnSpring = -1.0              ; Global RETURN-SPRING value. Values less than zero = read game defaults. Equal or bigger than zero = use typed value
AssistType = -1                  ; Global ASSIST-TYPE value. Values less than zero = read game defaults. 0 = DEFAULT | 1 = NONE | 2 = SPORTS | 3 = RACER

[HotKeys]
ToggleHood = 49                  ; Key - 1
ToggleDrawHUD = 20               ; Key - Caps Lock

[Misc]
DisableMinimizeOnAltTab = 0                   ; Stops the game from minimizing when switching windows. NOTE: This is implicitly enabled if WindowedMode is used!
DisableDInputSetCooperativeLevel_Keyboard = 1 ; Stops the game from using SetCooperativeLevel function in DirectInput (for keyboards). This will stop the game from using the old Alt-Tab dialog. NOTE: This is implicitly enabled if WindowedMode is used!
DisableDInputSetCooperativeLevel_Mouse = 0    ; Stops the game from using SetCooperativeLevel function in DirectInput (for mice). This will stop the game from locking the mouse within the window. NOTE: This is implicitly enabled if WindowedMode is used!
FixAltF4 = 1                                  ; Makes Alt+F4 work at all times.
Console = 0
NoMouse = 0                                   ; Disables all mouse inputs.
